<div class="management-container">
  <div class="header-panel">
    <h2>Rooms Management</h2>
    <button class="btn btn-primary" (click)="openAddModal()">+ Add Room</button>
  </div>

  <div class="filter-panel">
    <input type="text" placeholder="Search rooms..." (input)="onSearch($event)" class="form-control search-input" />
  </div>

  <div class="grid-wrapper">
    <ag-grid-angular style="width: 100%; height: 310px;" class="ag-theme-alpine" [rowData]="filteredRooms"
      [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [pagination]="true" [paginationPageSize]="10"
      [paginationPageSizeSelector]="[10, 20, 50]" (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)">
    </ag-grid-angular>
  </div>

  <div class="modal-backdrop" *ngIf="isModalOpen">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ isEditMode ? 'Edit Room' : 'Add Room' }}</h3>
        <button type="button" class="close-x" (click)="closeModal()">&times;</button>
      </div>

      <form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="modal-form">
        <div class="form-row">
          <div class="form-group col">
            <label>Room Number <span class="required">*</span></label>
            <input type="text" formControlName="roomNumber" class="form-control" />
          </div>
          <div class="form-group col">
            <label>Room Type <span class="required">*</span></label>
            <select formControlName="roomTypesId" class="form-control">
              <option [ngValue]="null">-- Select Room Type --</option>
              <option *ngFor="let type of roomTypesList" [ngValue]="type.id">
                {{ type.name }}
              </option>
            </select>
          </div>
          <div class="validation-error"
            *ngIf="roomForm.get('roomTypesId')?.invalid && roomForm.get('roomTypesId')?.touched">
            Room Type is required
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col">
            <label>Floor No <span class="required">*</span></label>
            <input type="number" formControlName="floorNumber" class="form-control" />
          </div>
          <div class="form-group col">
            <label>Price <span class="required">*</span></label>
            <input type="number" formControlName="price" class="form-control" />
          </div>
        </div>

        <div class="form-group">
          <label>Status <span class="required">*</span></label>
          <!-- <select formControlName="status" class="form-control">
            <option [ngValue]="null" disabled selected>-- Select Status --</option>
            <option value="Available">Available</option>
            <option value="Occupied">Occupied</option>
            <option value="Maintenance">Maintenance</option>
          </select> -->
          <select formControlName="status" class="form-control">
            <option [ngValue]="null">-- Select Status --</option>

            <option *ngFor="let status of statusOptions" [ngValue]="status.value">
              {{ status.label }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea rows="3" formControlName="description" class="form-control"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="roomForm.invalid">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
