<div class="management-container">
  <div class="header-panel">
    <h2>Rooms Management</h2>
    <button class="btn btn-primary" (click)="openAddModal()">+ Add Room</button>
  </div>

  <div class="filter-panel">
    <input type="text" placeholder="Search rooms..." (input)="onSearch($event)" class="form-control search-input" />
  </div>

  <div class="table-responsive">
    <table class="management-table">
      <thead>
        <tr>
          <th>Room Number</th>
          <th>Room Type</th>
          <th>Floor No</th>
          <th>Price</th>
          <th>Status</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let room of filteredRooms">
          <td><strong>{{ room.roomNumber }}</strong></td>
          <td>{{ room.roomTypeName }}</td>
          <td>{{ room.floorNumber }}</td>
          <td>₹{{ room.price | number:'1.2-2' }}</td>
          <td>
            <span class="status-badge" [ngClass]="room.status === 'Available' ? 'active' : 'inactive'">
              {{ room.status }}
            </span>
          </td>
          <td class="text-center actions-cell">
            <button class="action-btn edit-btn" title="Edit" (click)="openEditModal(room)">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="action-btn delete-btn" title="Delete" (click)="onDelete(room.id)">
              <i class="fas fa-trash"></i> Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="filteredRooms.length === 0">
          <td colspan="6" class="text-center text-muted py-4">No rooms available.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-backdrop" *ngIf="isModalOpen">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ isEditMode ? 'Edit Room' : 'Add Room' }}</h3>
        <button type="button" class="close-x" (click)="closeModal()">&times;</button>
      </div>

      <form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="modal-form">

        <div class="form-row">
          <div class="form-group col">
            <label>Room Number <span class="required">*</span></label>
            <input type="text" formControlName="roomNumber" class="form-control" />
          </div>
          <!-- <div class="form-group col">
            <label>Room Type <span class="required">*</span></label>
            <select formControlName="roomTypesId" class="form-control">
              <option [value]="0" disabled>-- Select Room Type --</option>
              <option *ngFor="let type of roomTypesList" [value]="type.id">
                {{ type.name }}
              </option>
            </select>
          </div> -->
          <div class="form-group col">
            <label>Room Type <span class="required">*</span></label>
            <!-- <select formControlName="roomTypesId" class="form-control">
              <option value="" disabled selected>-- Select Room Type --</option>
              <option *ngFor="let type of roomTypesList" [value]="type.id">
                {{ type.name }}
              </option>
            </select> -->
            <select formControlName="roomTypesId" class="form-control">

              <option [ngValue]="null">
                -- Select Room Type --
              </option>

              <option *ngFor="let type of roomTypesList" [ngValue]="type.id">
                {{ type.name }}
              </option>

            </select>
          </div>
          <div class="validation-error" *ngIf="
    roomForm.get('roomTypesId')?.invalid &&
    roomForm.get('roomTypesId')?.touched
  ">
            Room Type is required
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col">
            <label>Floor No <span class="required">*</span></label>
            <input type="number" formControlName="floorNumber" class="form-control" />
          </div>
          <div class="form-group col">
            <label>Price <span class="required">*</span></label>
            <input type="number" formControlName="price" class="form-control" />
          </div>
        </div>

        <div class="form-group">
          <label>Status <span class="required">*</span></label>
          <select formControlName="status" class="form-control">
            <option value="Available">Available</option>
            <option value="Occupied">Occupied</option>
            <option value="Maintenance">Maintenance</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea rows="3" formControlName="description" class="form-control"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="roomForm.invalid">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>

      </form>
      <!-- <pre>{{ roomForm.value | json }}</pre>
<pre>{{ roomForm.valid }}</pre> -->
    </div>
  </div>
</div>
