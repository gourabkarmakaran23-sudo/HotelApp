<div class="booking-list-page">

  <!-- Page Title Bar -->
  <div class="page-title-bar">
    <div class="title-section">
      <span class="material-icons page-icon">calendar_month</span>
      <div>
        <h1>Checked In</h1>
        <div class="subtitle">Booking check-in overview with guest actions</div>
      </div>
      <div class="view-tags">
        <span class="tag"><b>PV</b> Premium View</span>
        <span class="tag"><b>EV</b> Executive View</span>
        <span class="tag"><b>ENV</b> Executive Non View</span>
        <span class="tag"><b>FNV</b> Family Non View</span>
        <span class="tag"><b>FJV</b> Family Junior Non View</span>
      </div>
    </div>
    <button class="btn-room-booking" (click)="openNewBooking()">
      <span class="material-icons">add</span>
      Room Booking
    </button>
  </div>

  <!-- Filters -->
  <div class="filters-card">
    <div class="filter-row">
      <div class="filter-group">
        <label>Check-In From Date</label>
        <input type="date" class="filter-input" [(ngModel)]="filters.checkInFrom" />
      </div>
      <div class="filter-group">
        <label>Check-Out To Date</label>
        <input type="date" class="filter-input" [(ngModel)]="filters.checkOutTo" />
      </div>
      <div class="filter-group">
        <label>Customer Name</label>
        <input type="text" class="filter-input" placeholder="Customer Name" [(ngModel)]="filters.customerName" />
      </div>
      <div class="filter-group">
        <label>Guest Name</label>
        <input type="text" class="filter-input" placeholder="Guest Name" [(ngModel)]="filters.guestName" />
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>Ref. Booking No.</label>
        <input type="text" class="filter-input" placeholder="Ref. Booking No." [(ngModel)]="filters.refBookingNo" />
      </div>
      <div class="filter-group">
        <label>Payment Status</label>
        <select class="filter-input" [(ngModel)]="filters.paymentStatus">
          <option value="">Select Status</option>
          <option value="Paid">Paid</option>
          <option value="Pending">Pending</option>
          <option value="Partial">Partial</option>
        </select>
      </div>
      <div class="filter-actions">
        <button class="btn-search" (click)="applyFilters()">
          <span class="material-icons">search</span> Search
        </button>
        <button class="btn-clear" (click)="clearFilters()">
          <span class="material-icons">clear</span> Clear
        </button>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="grid-toolbar">
    <div class="toolbar-left">
      <label class="show-entries">
        Show
        <select [(ngModel)]="pageSize" (change)="onPageSizeChange()">
          <option [value]="10">10</option>
          <option [value]="25">25</option>
          <option [value]="50">50</option>
          <option [value]="100">100</option>
        </select>
        entries
      </label>
      <button class="toolbar-btn" (click)="exportCSV()">
        <span class="material-icons">download</span> CSV
      </button>
      <button class="toolbar-btn" (click)="onPrint()">
        <span class="material-icons">print</span> Print
      </button>
      <button class="toolbar-btn" (click)="toggleColumnVisibility()">
        <span class="material-icons">view_column</span> Column Visibility
      </button>
    </div>
    <div class="toolbar-right">
      <div class="search-box">
        <span class="material-icons">search</span>
        <input type="text" placeholder="Search..." [(ngModel)]="quickFilter" (input)="onQuickFilterChange()" />
      </div>
      <div class="record-count">
        <span class="material-icons">info_outline</span>
        {{ filteredRowCount }} records
      </div>
    </div>
  </div>

  <!-- Column Visibility Panel -->
  <div class="col-visibility-panel" *ngIf="showColPanel">
    <div class="col-panel-header">
      <span>Toggle Columns</span>
      <button (click)="showColPanel = false" class="close-btn">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="col-panel-body">
      <label *ngFor="let col of toggleableColumns" class="col-toggle">
        <input type="checkbox" [checked]="col.visible" (change)="toggleColumn(col)" />
        {{ col.headerName }}
      </label>
    </div>
  </div>

  <!-- AG-Grid -->

  <div class="grid-wrapper">


  <ag-grid-angular
  class="ag-theme-alpine"
  [rowData]="rowData"
  [columnDefs]="columnDefs"
  [defaultColDef]="defaultColDef"
  [pagination]="true"
  [paginationPageSize]="pageSize"
  [quickFilterText]="quickFilter"
  [animateRows]="true"
  [rowSelection]="'multiple'"
  [suppressRowClickSelection]="true"
  [rowHeight]="44"
  [headerHeight]="46"
  (gridReady)="onGridReady($event)"
  (filterChanged)="onFilterChanged()"
  (paginationChanged)="onPaginationChanged()"
  style="width: 100%; height: 100%;">
</ag-grid-angular>
</div>
</div>
