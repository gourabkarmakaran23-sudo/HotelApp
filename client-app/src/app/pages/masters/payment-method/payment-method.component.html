<div class="management-container">
  <div class="header-panel">
    <h2>Payment Methods Management</h2>
    <button class="btn btn-primary" (click)="addNew()">+ Add Payment Method</button>
  </div>

  <div class="table-responsive">
    <table class="management-table">
      <thead>
        <tr>
          <th style="width: 10%">SL</th>
          <th style="width: 50%">Method Name</th>
          <th style="width: 20%">Status</th>
          <th style="width: 20%" class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of paymentMethods; let i = index">
          <td>{{ i + 1 }}</td>
          <td><strong>{{ item.methodName }}</strong></td>
          <td>
            <span class="status-badge" [ngClass]="item.isActive ? 'active' : 'inactive'">
              {{ item.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="text-center actions-cell">
            <button class="action-btn edit-btn" title="Edit" (click)="edit(item)">
              <i class="fa fa-pencil"></i> Edit
            </button>
            <button class="action-btn delete-btn" title="Delete" (click)="delete(item.id)">
              <i class="fa fa-trash"></i> Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="paymentMethods.length === 0">
          <td colspan="4" class="text-center no-data-message">No payment options configured in the system.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal">
  <div class="custom-modal">
    <div class="modal-header">
      <h3>{{ isEditMode ? 'Edit Payment Method Parameters' : 'Add New Payment Method' }}</h3>
      <button class="close-x" (click)="closeModal()">&times;</button>
    </div>

    <form [formGroup]="paymentForm" (ngSubmit)="save()" class="modal-form">
      <div class="form-group">
        <label>Method Name <span class="required">*</span></label>
        <input type="text" formControlName="methodName" placeholder="e.g. Credit Card, UPI, Cash" class="form-control" />
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isActive" />
          <span>Enable for reservation checkout processes</span>
        </label>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
