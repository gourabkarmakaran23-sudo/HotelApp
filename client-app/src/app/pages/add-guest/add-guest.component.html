<div class="add-guest-page">
  <div class="top-toolbar">
    <div class="toolbar-left">
      <button class="btn" (click)="router.navigate(['/checkin'])">Back</button>
      <button class="btn">Print</button>
      <button class="btn">Print (Draft)</button>
      <button class="btn">View</button>
      <button class="btn">Cancel Reservation</button>
      <button class="btn">Payment</button>
      <button class="btn">Gtc Form</button>
    </div>
    <div class="toolbar-right">
      <button class="btn primary" (click)="openAddGuestModal()">+ Add new guest</button>
    </div>
  </div>

  <div class="page-header">
    Guest Details of booking No : 00002706 | Dr. Sneha Singh | Mr. Arjun Roy
  </div>

  <div class="content-grid">
    <div class="left-col">
      <div class="controls">
        <label>Show
          <select>
            <option>10</option>
            <option>25</option>
          </select>
          entries
        </label>
        <div class="search-box">
          <input placeholder="Search..." />
        </div>
      </div>

      <table class="guest-table">
        <thead>
          <tr>
            <th>SL</th>
            <th>Room No</th>
            <th>First name</th>
            <th>Last name</th>
            <th>Mobile No.</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let g of guests; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ g.roomNo }}</td>
            <td>{{ g.firstName }}</td>
            <td>{{ g.lastName }}</td>
            <td>{{ g.mobile }}</td>
            <td>
              <!-- <button class="small" (click)="alert('Edit')">✎</button>
              <button class="small" (click)="alert('Delete')">🗑</button> -->
              <!-- ✅ FIXED — use the methods already in your TS file -->
              <button class="small" (click)="editGuest(guest)">✎</button>
              <button class="small" (click)="deleteGuest(i)">🗑</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="right-col">
      <div class="upload-card">
        <label>Document Upload</label>
        <div class="upload-row">
          <input type="file" (change)="uploadFile($event)" />
          <button class="btn">Browse</button>
        </div>
        <div class="uploaded">
          <h4>UPLOADED DOCUMENTS</h4>
          <p class="empty">No documents uploaded</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" *ngIf="showAddGuestModal" (click)="cancelNewGuest()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <h3>Add New Guest</h3>
      <div class="modal-form">
        <label>Room No.</label>
        <input [(ngModel)]="newGuest.roomNo" name="modalRoomNo" />
        <label>First Name</label>
        <input [(ngModel)]="newGuest.firstName" name="modalFirstName" />
        <label>Last Name</label>
        <input [(ngModel)]="newGuest.lastName" name="modalLastName" />
        <label>Mobile</label>
        <input [(ngModel)]="newGuest.mobile" name="modalMobile" />
      </div>
      <div class="modal-actions">
        <button class="btn primary" (click)="saveNewGuest()">Save</button>
        <button class="btn" (click)="cancelNewGuest()">Cancel</button>
      </div>
    </div>
  </div>
</div>
